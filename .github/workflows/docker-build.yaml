name: Build and Push Docker Hub Images

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for Docker images (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: read

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        with:
          fetch-depth: 0
      - name: Skip build when commit already has release tag
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/heads/* ]] && git tag --points-at HEAD | grep -q '^v'; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping beta build: commit already has a release tag"
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: pre-check
    if: needs.pre-check.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_beta: ${{ steps.version.outputs.is_beta }}
      image: ${{ steps.repo.outputs.image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker Hub repo
        id: repo
        run: |
          NAMESPACE="${{ secrets.DOCKERHUB_USERNAME }}"
          if [ -z "$NAMESPACE" ]; then
            NAMESPACE="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          fi
          echo "image=${NAMESPACE}/kiro-rs" >> "$GITHUB_OUTPUT"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
            echo "version=${RAW_VERSION#v}" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-6)
            echo "version=beta-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is_beta=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          provenance: false
          tags: ${{ steps.repo.outputs.image }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Kiro.rs Docker Image

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          IS_BETA="${{ needs.build.outputs.is_beta }}"
          IMAGE="${{ needs.build.outputs.image }}"

          docker manifest create ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64
          docker manifest push ${IMAGE}:${VERSION}

          if [ "${IS_BETA}" != "true" ]; then
            docker manifest create ${IMAGE}:latest \
              ${IMAGE}:${VERSION}-amd64 \
              ${IMAGE}:${VERSION}-arm64
            docker manifest push ${IMAGE}:latest
          fi

          if [ "${IS_BETA}" = "true" ]; then
            docker manifest create ${IMAGE}:beta \
              ${IMAGE}:${VERSION}-amd64 \
              ${IMAGE}:${VERSION}-arm64
            docker manifest push ${IMAGE}:beta
          fi
